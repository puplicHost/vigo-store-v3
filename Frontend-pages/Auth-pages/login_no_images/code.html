<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>THE ATELIER | Sign In</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif:ital,wght@0,400;0,700;1,400&amp;family=Manrope:wght@300;400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-tertiary-fixed-variant": "#474747",
                        "tertiary-fixed-dim": "#c8c6c6",
                        "on-primary": "#ffffff",
                        "surface-dim": "#dcd9d9",
                        "primary-fixed-dim": "#e9c176",
                        "primary-container": "#c5a059",
                        "on-primary-fixed-variant": "#5d4201",
                        "inverse-surface": "#313030",
                        "secondary-container": "#e2dfde",
                        "error": "#ba1a1a",
                        "outline": "#7f7667",
                        "on-primary-container": "#4e3700",
                        "surface-bright": "#fcf9f8",
                        "background": "#fcf9f8",
                        "primary-fixed": "#ffdea5",
                        "on-error-container": "#93000a",
                        "error-container": "#ffdad6",
                        "tertiary-container": "#a6a5a5",
                        "surface-container-high": "#ebe7e7",
                        "on-tertiary-fixed": "#1b1c1c",
                        "tertiary-fixed": "#e4e2e1",
                        "surface": "#fcf9f8",
                        "secondary-fixed": "#e5e2e1",
                        "inverse-on-surface": "#f3f0ef",
                        "on-primary-fixed": "#261900",
                        "on-secondary": "#ffffff",
                        "on-error": "#ffffff",
                        "surface-container-highest": "#e5e2e1",
                        "outline-variant": "#d1c5b4",
                        "on-surface": "#1c1b1b",
                        "tertiary": "#5f5e5e",
                        "surface-tint": "#775a19",
                        "secondary": "#5f5e5e",
                        "on-secondary-container": "#636262",
                        "surface-container": "#f0edec",
                        "on-background": "#1c1b1b",
                        "inverse-primary": "#e9c176",
                        "surface-variant": "#e5e2e1",
                        "on-secondary-fixed": "#1c1b1b",
                        "secondary-fixed-dim": "#c8c6c5",
                        "surface-container-low": "#f6f3f2",
                        "on-tertiary-container": "#3b3b3b",
                        "on-secondary-fixed-variant": "#474746",
                        "on-surface-variant": "#4e4639",
                        "primary": "#775a19",
                        "surface-container-lowest": "#ffffff",
                        "on-tertiary": "#ffffff"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "fontFamily": {
                        "headline": ["Noto Serif"],
                        "body": ["Manrope"],
                        "label": ["Manrope"]
                    }
                },
            },
        }
    </script>
<style>
        body { font-family: 'Manrope', sans-serif; }
        h1, h2, h3, .font-serif { font-family: 'Noto Serif', serif; }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
        }
        .btn-gradient {
            background: linear-gradient(135deg, #775a19 0%, #c5a059 100%);
        }
    </style>
</head>
<body class="bg-surface text-on-surface min-h-screen flex flex-col">
<main class="flex-grow flex flex-col items-center justify-center px-8 py-16 bg-surface-container-lowest">
<div class="w-full max-w-md space-y-12">
<!-- Header & Branding -->
<div class="text-center">
<h1 class="text-3xl font-serif italic tracking-[0.25em] text-on-surface mb-12">THE ATELIER</h1>
<div class="space-y-3">
<h2 class="text-4xl font-headline tracking-tighter text-on-surface">Welcome Back</h2>
<p class="text-on-surface-variant/80 font-body text-sm leading-relaxed max-w-xs mx-auto">Please enter your credentials to access your private salon.</p>
</div>
</div>
<!-- Login Form -->
<form class="space-y-10">
<div class="space-y-6">
<!-- Email Input -->
<div class="group relative">
<label class="block font-label text-[10px] uppercase tracking-[0.15em] text-on-surface-variant mb-1 transition-colors group-focus-within:text-primary" for="email">Email Address</label>
<input class="w-full bg-transparent border-0 border-b border-outline-variant/30 py-3 px-0 focus:ring-0 focus:border-primary transition-all duration-300 font-body text-on-surface placeholder:text-on-surface-variant/30" id="email" name="email" placeholder="atelier@example.com" required="" type="email"/>
</div>
<!-- Password Input -->
<div class="group relative">
<div class="flex justify-between items-end">
<label class="block font-label text-[10px] uppercase tracking-[0.15em] text-on-surface-variant mb-1 transition-colors group-focus-within:text-primary" for="password">Password</label>
<a class="font-label text-[10px] uppercase tracking-[0.1em] text-on-surface-variant hover:text-primary transition-colors mb-1 underline underline-offset-4 decoration-outline-variant/30" href="#">Forgot?</a>
</div>
<input class="w-full bg-transparent border-0 border-b border-outline-variant/30 py-3 px-0 focus:ring-0 focus:border-primary transition-all duration-300 font-body text-on-surface placeholder:text-on-surface-variant/30" id="password" name="password" placeholder="••••••••" required="" type="password"/>
</div>
</div>
<!-- CTA Section -->
<div class="pt-4 flex flex-col gap-6">
<button class="btn-gradient w-full py-4 px-8 rounded-lg text-on-primary font-label text-[12px] font-semibold uppercase tracking-[0.2em] shadow-lg shadow-primary/10 hover:opacity-90 active:scale-[0.98] transition-all duration-200" type="submit">
                    Sign In
                </button>
<div class="flex items-center gap-4">
<span class="flex-grow h-[1px] bg-outline-variant/20"></span>
<span class="font-label text-[10px] text-on-surface-variant/50 uppercase tracking-widest">or</span>
<span class="flex-grow h-[1px] bg-outline-variant/20"></span>
</div>
<button class="w-full py-4 px-8 rounded-lg bg-surface border border-outline-variant/15 text-on-surface font-label text-[10px] uppercase tracking-[0.2em] hover:bg-surface-container-low transition-colors flex justify-center items-center gap-3" type="button">
<span class="material-symbols-outlined text-lg">account_circle</span>
                    Continue with Google
                </button>
</div>
</form>
<!-- Footer Link -->
<div class="text-center pt-8 border-t border-outline-variant/10">
<p class="font-body text-sm text-on-surface-variant/70">
                New to The Atelier? 
                <a class="text-primary font-semibold hover:underline underline-offset-4 ml-1" href="#">Create an account</a>
</p>
</div>
</div>
</main>
<footer class="bg-surface-container-low dark:bg-[#121111] w-full py-8 mt-auto flex flex-col md:flex-row justify-between items-center px-12 gap-4 border-t border-outline-variant/10">
<div class="text-lg font-serif italic text-[#1c1b1b] dark:text-[#fcf9f8]">THE ATELIER</div>
<div class="flex gap-8">
<a class="font-sans text-[10px] uppercase tracking-[0.2em] text-[#1c1b1b]/60 dark:text-[#fcf9f8]/60 hover:text-[#775a19] transition-colors" href="#">Privacy Policy</a>
<a class="font-sans text-[10px] uppercase tracking-[0.2em] text-[#1c1b1b]/60 dark:text-[#fcf9f8]/60 hover:text-[#775a19] transition-colors" href="#">Terms of Service</a>
<a class="font-sans text-[10px] uppercase tracking-[0.2em] text-[#1c1b1b]/60 dark:text-[#fcf9f8]/60 hover:text-[#775a19] transition-colors" href="#">Accessibility</a>
</div>
<div class="font-sans text-[10px] uppercase tracking-[0.2em] text-[#775a19] dark:text-[#C5A059]">
        © 2024 THE ATELIER. ALL RIGHTS RESERVED.
    </div>
</footer>
</body></html>
